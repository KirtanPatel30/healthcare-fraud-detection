version: '3.8'

services:
  db:
    image: postgres:15
    container_name: fraud_db
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_pass
      POSTGRES_DB: healthcare_fraud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user -d healthcare_fraud"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fraud_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fraud_user:fraud_pass@db:5432/healthcare_fraud
    volumes:
      - .:/app

  dashboard:
    build: .
    container_name: fraud_dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://fraud_user:fraud_pass@db:5432/healthcare_fraud
    volumes:
      - .:/app

volumes:
  postgres_data:
